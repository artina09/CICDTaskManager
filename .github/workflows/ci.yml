name: Pipeline CI

# 1. TRIGGER: Se ejecuta al hacer push o pull request a la rama main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_y_test:
    # 2. RUNNER: GitHub nos presta una máquina Linux gratuita
    runs-on: ubuntu-latest 

    steps:
    # 3. ACTION: Descarga nuestro código en la máquina virtual
    - name: Checkout del código
      uses: actions/checkout@v4

    # 4. ACTION: Instala Java 21 y activa la caché de dependencias (para ir más rápido)
    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 6. STEP: Compilamos y pasamos pruebas. 
    # Usamos -B (Batch mode para logs limpios) y 'verify' para pruebas de integración
    - name: Compilar y Testear
      run: mvn -B verify
      
